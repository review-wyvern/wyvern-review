name: Tests

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check_formatting:
    name: Run Tests
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Install Dependencies
      run: |
        python3 -m venv venv
        source venv/bin/activate
        pip3 install pytest==8.4.1
        pip3 install -r ./requirements.lock.txt
    - name: Run Tests
      run: |
        source venv/bin/activate
        cd review_runner
        python3 -m pytest

